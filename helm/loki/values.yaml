deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    retention_period: 720h
  compactor:
    retention_enabled: true

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  persistence:
    enabled: true
    storageClass: hcloud-network-volumes
    size: 50Gi

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

monitoring:
  selfMonitoring:
    enabled: false
