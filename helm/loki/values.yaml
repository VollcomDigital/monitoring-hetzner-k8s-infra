deploymentMode: SingleBinary

# Chart defaults enable nginx gateway + memcached caches (heavy); single-binary only needs the Loki STS + Service.
gateway:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false

lokiCanary:
  enabled: false

test:
  enabled: false

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    retention_period: 0
  compactor:
    retention_enabled: false
  rulerConfig:
    storage:
      type: local
      local:
        directory: /var/loki/rules
  readinessProbe:
    initialDelaySeconds: 45
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 20

singleBinary:
  replicas: 1
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution: []
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: single-binary
            topologyKey: kubernetes.io/hostname
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 2Gi
  persistence:
    enabled: true
    storageClass: hcloud-network-volumes-immediate
    size: 50Gi

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

monitoring:
  selfMonitoring:
    enabled: false
