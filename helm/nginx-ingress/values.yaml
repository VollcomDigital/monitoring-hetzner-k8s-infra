controller:
  # When the API server cannot reach ClusterIP admission webhooks (common on some k3s/control-plane setups),
  # Ingress creates fail with validate.nginx.ingress.kubernetes.io timeouts. Disable to skip server-side validation.
  admissionWebhooks:
    enabled: false
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  service:
    annotations:
      load-balancer.hetzner.cloud/name: "monitoring-nginx-ingress"
      load-balancer.hetzner.cloud/type: "lb11"
      load-balancer.hetzner.cloud/use-private-ip: "true"
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring

defaultBackend:
  enabled: true
