crds:
  enabled: true

# k3s: install hook times out before webhook is ready; cert-manager still functions.
startupapicheck:
  enabled: false

replicaCount: 2

# k3s: apiserver often cannot reach webhook ClusterIP; hostNetwork + unique securePort avoids kubelet (10250).
webhook:
  replicaCount: 1
  hostNetwork: true
  securePort: 10260

prometheus:
  enabled: true
  servicemonitor:
    enabled: true
    namespace: monitoring
