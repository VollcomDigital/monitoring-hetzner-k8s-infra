# HTTP on the load balancer IP: no host rule, so requests to http://<LB-IP>/ match.
# Use with MONITORING_UI_VIA_LB_IP=true. Clear GRAFANA_HOST (or do not set) to avoid
# name-based ingress for the same app if you only use the IP.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-by-lb-ip
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-grafana
                port:
                  number: 80
